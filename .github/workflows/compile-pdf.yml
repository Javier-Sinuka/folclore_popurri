name: Build & Deploy Quarkdown

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Quarkdown
        uses: quarkdown-labs/setup-quarkdown@v1

      - name: Compile Quarkdown + FIX estructura
        run: |
          rm -rf output
          mkdir -p output

          quarkdown c repertorio_folclore.qd -o output/

          echo "=== BEFORE FIX ==="
          ls -R output

          # Detectar carpeta generada automáticamente
          SUBDIR=$(find output -mindepth 1 -maxdepth 1 -type d)

          # Mover contenido al root
          if [ -n "$SUBDIR" ]; then
            mv "$SUBDIR"/* output/
            rm -rf "$SUBDIR"
          fi

          # Evitar problemas con Jekyll
          touch output/.nojekyll

          echo "=== AFTER FIX ==="
          ls -R output

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./output

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
